---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
# yamllint disable rule:truthy

name: "OpenSSF Scorecard"

run-name: >-
    OpenSSF Scorecard - ${{
        github.event.rule.name ||
        github.sha ||
        github.ref_name ||
        github.run_id
    }}

concurrency:
    group: >-
        ossf-scorecard-${{ github.workflow }}-${{
            github.event.rule.name ||
            github.sha ||
            github.ref ||
            github.run_id
        }}
    cancel-in-progress: true

on:
    branch_protection_rule:
        types:
            - "created"
            - "edited"
            - "deleted"
    schedule:
        - cron: "20 7 * * 2"
    push:
        branches:
            - "main"
            - "master"
            - "dev"
    workflow_dispatch:

permissions: {}

jobs:
    scorecard:
        name: "OpenSSF Scorecard"
        permissions:
            actions: "read"
            checks: "read"
            contents: "read"
            id-token: "write"
            issues: "read"
            pull-requests: "read"
            security-events: "write"
        uses: >-
            Nick2bad4u/workflow-templates/.github/workflows/reusable-ossf-scorecard.yml@main
