---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
# yamllint disable rule:truthy

name: "Continuous Integration"

run-name: >-
    Continuous Integration • ${{ github.event_name }} • ${{
        github.event.pull_request.number || github.ref_name || github.sha
    }}

on:
    push:
        branches:
            - "main"
            - "dev"
    pull_request:
    merge_group:
        types:
            - "checks_requested"

concurrency:
    group: "ci-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions: {}

jobs:
    node-test-matrix:
        name: "Node.js matrix"
        permissions:
            contents: "read"
            id-token: "write"
        uses: >-
            Nick2bad4u/workflow-templates/.github/workflows/reusable-node-test-matrix.yml@58ce16bfdbbf38d6c61ad95625791a058e3b525c
        secrets:
            CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"

    release-verify:
        name: "Release verification"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        permissions:
            contents: "read"
        defaults:
            run:
                shell: "bash"
        steps:
            - name: "Checkout"
              uses: >-
                  actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: "Setup Node"
              uses: >-
                  actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install dependencies"
              run: "npm ci"

            - name: "Verify release readiness"
              run: "npm run release:check"
